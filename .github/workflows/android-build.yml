name: Android CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - native
          - capacitor

jobs:
  # ─── 原生 Kotlin Compose 客户端 ──────────────────────────────────
  native-android:
    name: Native Android (Kotlin + Compose)
    if: |
      github.event_name != 'workflow_dispatch'
      || inputs.build_type == 'all'
      || inputs.build_type == 'native'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" \
                     "build-tools;36.0.0" \
                     "platform-tools" \
                     "cmdline-tools;latest" \
                     --sdk_root=$ANDROID_HOME
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('kotlin-quiz/**/*.gradle.kts', 'kotlin-quiz/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle
        run: chmod +x kotlin-quiz/gradlew

      - name: Generate debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \n            -alias androiddebugkey -keyalg RSA -keysize 2048 \n            -validity 10000 -storepass android -keypass android \n            -dname "CN=, OU=, O=, L=, S=, C="

      - name: Build Debug APK
        run: cd kotlin-quiz && ./gradlew assembleDebug

      - name: Build Release APK
        run: cd kotlin-quiz && ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: native-app-debug
          path: kotlin-quiz/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: native-app-release
          path: kotlin-quiz/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ─── WebApp + Capacitor 壳工程（原有） ──────────────────────────
  capacitor-android:
    name: Capacitor Android (WebView)
    if: |
      github.event_name != 'workflow_dispatch'
      || inputs.build_type == 'all'
      || inputs.build_type == 'capacitor'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" \
                     "build-tools;36.0.0" \
                     "platform-tools" \
                     --sdk_root=$ANDROID_HOME
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}

      - name: Sync web to Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload Capacitor APK
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ─── GitHub Release（仅 main 分支 push 时） ─────────────────────
  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [native-android, capacitor-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: |
            native-app-debug/app-debug.apk
            native-app-release/app-release.apk
            capacitor-app-debug/app-debug.apk
          generate_release_notes: true
